spring:
  application:
    name: bike-rental
  config:
    import: application-management-config.yaml
  datasource:
    url: ${DATASOURCE_URL}
    username: ${DATASOURCE_USER}
    password: ${DATASOURCE_SECRET}
  liquibase:
    analytics-enabled: false
    drop-first: false
    change-log: classpath:/db/changelog/db.changelog-master.xml
  jpa:
    open-in-view: false

logging:
  level:
    root: info
#    org.springframework.security.oauth2.server.authorization: DEBUG
#    org.springframework.security.oauth2.server.authorization.authentication: TRACE
#    org.springframework.security.web: DEBUG

springdoc:
  swagger-ui:
    enabled: true
    urls-primary-name: all
  api-docs:
    enabled: true

app:
  default-locale: en
  zone-id: Europe/Vilnius
  customers:
    search-limit-result: 10
  rental:
    time-increment: 5m
    forgiveness:
      overtime-duration: 7m
  tariff:
    quote-ttl: 5m
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS}
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: false
    max-age: 3600
  dev:
    virtual-clock:
      sse-interval-ms: 1000
  security:
    jwt:
      issuer: ${OAUTH2_ISSUER}
      access-token-ttl: PT15M
      refresh-token-ttl: P14D
      key-id: ${JWT_KEY_ID:bike-rental-identity}
      user-id-claim: uid
      private-key-location: ${JWT_PRIVATE_KEY_LOCATION:}
      public-key-location: ${JWT_PUBLIC_KEY_LOCATION:}
    password:
      min-length: 8
      max-length: 20
    authority:
      role-prefix: "ROLE_"
    spa-clients:
      - client-id: ${ADMIN_SPA_CLIENT_ID}
        redirect-uris: ${ADMIN_SPA_REDIRECT_URIS}
        post-logout-redirect-uris: ${ADMIN_SPA_POST_LOGOUT_URIS}
        scopes: openid,profile,offline_access
      - client-id: ${OPERATOR_SPA_CLIENT_ID}
        redirect-uris: ${OPERATOR_SPA_REDIRECT_URIS}
        post-logout-redirect-uris: ${OPERATOR_SPA_POST_LOGOUT_URIS}
        scopes: openid,profile,offline_access
    bootstrap:
      enabled: ${BOOTSTRAP_ENABLED}
      admin-user:
        username: ${BOOTSTRAP_ADMIN_USERNAME}
        email: ${BOOTSTRAP_ADMIN_EMAIL}
        display-name: Root Admin
        password: ${BOOTSTRAP_ADMIN_PASSWORD}
  agreement:
    pdf:
      font-location: fonts/DejaVuSans.ttf
      margin: 50
      body-font-size: 11
      small-font-size: 6
      title-font-size: 16
      leading-factor: 1.4
      signature-width: 180
      signature-height: 80
      signature-placeholder-label: Signature placeholder
      date-time-pattern: dd.MM.yyyy HH:mm
      date-pattern: dd.MM.yyyy
      zone-id: Europe/Minsk
      currency: BYN

