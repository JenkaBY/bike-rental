name: bike-rental-pi

services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
      args:
        POSTGRES_IMAGE: ${POSTGRES_IMAGE:-postgres:15-alpine}
    image: bike-rental-pi-postgres:local
    container_name: bike-rental-postgres
    restart: always
    shm_size: 256mb
    ports:
      - "${PG_PUBLISHED_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bikerental}
      EXTRA_DATABASES: ${EXTRA_DATABASES:-}
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
      BIKERENTAL_ADMIN_PASSWORD: ${BIKERENTAL_ADMIN_PASSWORD:?set BIKERENTAL_ADMIN_PASSWORD in .env}
      BIKERENTAL_LIQUIBASE_PASSWORD: ${BIKERENTAL_LIQUIBASE_PASSWORD:?set BIKERENTAL_LIQUIBASE_PASSWORD in .env}
      BIKERENTAL_APP_PASSWORD: ${BIKERENTAL_APP_PASSWORD:?set BIKERENTAL_APP_PASSWORD in .env}
      BIKERENTAL_APP_MIGRATOR_PASSWORD: ${BIKERENTAL_APP_MIGRATOR_PASSWORD:?set BIKERENTAL_APP_MIGRATOR_PASSWORD in .env}
      LAN_SUBNET: ${LAN_SUBNET:-192.168.0.0/16}
      ROUTER_IP: ${ROUTER_IP:-192.168.1.1}
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - ./postgres/pg_hba.conf.template:/etc/postgresql/pg_hba.conf.template:ro
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./certs:/tls:ro
      - ./logs:/var/log/postgresql
      - ${BACKUP_DIR:-./backups}:/data/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ${POSTGRES_DB:-bikerental}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  pgdata:
    external: true
    name: ${PGDATA_VOLUME:-bike-rental-pgdata}
