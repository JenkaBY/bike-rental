# PostgreSQL configuration for the Raspberry Pi deployment.
# Loaded via `postgres -c config_file=/etc/postgresql/postgresql.conf`.
# The data directory comes from the PGDATA env var set by the base image.

#------------------------------------------------------------------------------
# CONNECTIONS
#------------------------------------------------------------------------------
listen_addresses = '*'
port = 5432
max_connections = 50

# Authentication rules live in a file rendered by the entrypoint from a template.
hba_file = '/etc/postgresql/pg_hba.conf'

# TCP keepalives: Render connects over the internet through the router's
# port-forward, and the NAT table drops idle entries after a few minutes. These
# probes keep idle connections alive (and detect dead peers), preventing the
# "This connection has been closed" warnings in pooled clients like HikariCP.
tcp_keepalives_idle = 60        # start probing after 60s idle
tcp_keepalives_interval = 15    # then probe every 15s
tcp_keepalives_count = 4        # drop the connection after 4 failed probes

#------------------------------------------------------------------------------
# SECURITY / TLS
#------------------------------------------------------------------------------
password_encryption = scram-sha-256

ssl = on
ssl_cert_file = '/etc/postgresql/certs/server.crt'
ssl_key_file = '/etc/postgresql/certs/server.key'
ssl_min_protocol_version = 'TLSv1.2'

#------------------------------------------------------------------------------
# RESOURCES (conservative defaults for a Raspberry Pi 5; tune to your RAM)
#------------------------------------------------------------------------------
shared_buffers = 256MB
effective_cache_size = 1GB
maintenance_work_mem = 128MB
work_mem = 8MB

# NVMe SSD characteristics
random_page_cost = 1.1
effective_io_concurrency = 200

#------------------------------------------------------------------------------
# WAL / CHECKPOINTS
#------------------------------------------------------------------------------
wal_compression = on
checkpoint_completion_target = 0.9

#------------------------------------------------------------------------------
# LOGGING (collector writes files that fail2ban watches; %h exposes client IP)
#------------------------------------------------------------------------------
logging_collector = on
log_directory = '/var/log/postgresql'
# One dated file per day (postgresql-YYYY-MM-DD.log). Size-based rotation is
# disabled so a busy day stays in a single file. Old files are deleted after 7
# days by the log-retention step in backup/pg-backup.sh (run by the daily timer).
log_filename = 'postgresql-%Y-%m-%d.log'
log_file_mode = 0644
log_rotation_age = 1d
log_rotation_size = 0
log_connections = on
log_disconnections = on
log_line_prefix = '%m [%p] %q%u@%d from %h '

#------------------------------------------------------------------------------
# TIME
#------------------------------------------------------------------------------
timezone = 'UTC'
log_timezone = 'UTC'
