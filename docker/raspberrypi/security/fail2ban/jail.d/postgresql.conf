# fail2ban jail for PostgreSQL. Install to /etc/fail2ban/jail.d/postgresql.conf
# Point logpath at the host folder bind-mounted to /var/log/postgresql, and
# adjust the path to where you cloned the repo.

[postgresql]
enabled  = true
port     = 5432
filter   = postgresql
backend  = auto
# Adjust the path to match where you cloned the repo (default: ~/bike-rental).
logpath  = /home/*/bike-rental/docker/raspberrypi/logs/postgresql-*.log
maxretry = 5
findtime = 10m
bantime  = 1h
# The Keenetic router NATs all port-forwarded connections, so every external
# connection appears to come from the router's LAN IP. Never ban it or all
# internet access to Postgres is cut off.
ignoreip = 127.0.0.1/8 ::1 192.168.1.1
