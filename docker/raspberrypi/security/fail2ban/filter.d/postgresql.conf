# fail2ban filter for PostgreSQL auth failures. Relies on log_line_prefix
# including "from %h" (set in postgresql.conf) so the client IP is captured.
# Install to /etc/fail2ban/filter.d/postgresql.conf

[Definition]
failregex = from <HOST> FATAL:\s+password authentication failed for user
            from <HOST> FATAL:\s+no pg_hba\.conf entry for host
            from <HOST> FATAL:\s+role ".*" does not exist
ignoreregex =
