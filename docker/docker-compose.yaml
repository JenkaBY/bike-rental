name: bike-rental

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=bikerental
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=postgres
    volumes:
      - "bikesharing-db:/var/lib/postgresql/data"


volumes:
  bikesharing-db:
