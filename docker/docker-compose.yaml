name: bike-rental

services:
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    restart: always
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=bikerental
      - POSTGRES_USER={DATASOURCE_USER}
      - POSTGRES_PASSWORD=${DATASOURCE_SECRET}
    volumes:
      - "bikesharing-db:/var/lib/postgresql/data"
#  pgadmin:
#    image: dpage/pgadmin4:9.16
#    ports:
#      - "5050:80"
#    environment:
#      # Required by pgAdmin
#      PGADMIN_DEFAULT_EMAIL: demo@example.com
#      PGADMIN_DEFAULT_PASSWORD: secret
#      # Don't require the user to login
#      PGADMIN_CONFIG_SERVER_MODE: 'False'
#      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
#    volumes:
#      - "./pg-admin:/tmp"
  bike-rental-app:
    build:
      context: ..
      dockerfile: service/Dockerfile
      args:
        SERVICE: service
        GIT_COMMIT: ${GIT_COMMIT:-localRun}
    container_name: bike-rental-app
    restart: always
    ports:
      - "8080:80"
    environment:
      - DATASOURCE_URL=${DATASOURCE_URL:?set in .env}
      - DATASOURCE_USER=${DATASOURCE_USER}
      - DATASOURCE_SECRET=${DATASOURCE_SECRET}
      - SPRING_LIQUIBASE_USER=${SPRING_LIQUIBASE_USER}
      - SPRING_LIQUIBASE_PASSWORD=${SPRING_LIQUIBASE_PASSWORD}
      - SERVER_PORT=${SERVER_PORT}
      - SPRING_LIQUIBASE_DROP_FIRST=false
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
      - OAUTH2_ISSUER=${OAUTH2_ISSUER:?set in .env}
      - JWT_KEY_ID=${JWT_KEY_ID:-bike-rental-identity}
      - JWT_PRIVATE_KEY_LOCATION=${JWT_PRIVATE_KEY_LOCATION:-}
      - JWT_PUBLIC_KEY_LOCATION=${JWT_PUBLIC_KEY_LOCATION:-}
      - ADMIN_SPA_CLIENT_ID=${ADMIN_SPA_CLIENT_ID}
      - ADMIN_SPA_REDIRECT_URIS=${ADMIN_SPA_REDIRECT_URIS}
      - ADMIN_SPA_POST_LOGOUT_URIS=${ADMIN_SPA_POST_LOGOUT_URIS}
      - OPERATOR_SPA_CLIENT_ID=${OPERATOR_SPA_CLIENT_ID}
      - OPERATOR_SPA_REDIRECT_URIS=${OPERATOR_SPA_REDIRECT_URIS}
      - OPERATOR_SPA_POST_LOGOUT_URIS=${OPERATOR_SPA_POST_LOGOUT_URIS}
      - BOOTSTRAP_ENABLED=${BOOTSTRAP_ENABLED}
      - BOOTSTRAP_ADMIN_USERNAME=${BOOTSTRAP_ADMIN_USERNAME}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD}
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL}
      - LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_SECURITY=INFO
      - APP_AGGREEMENT_PDF_ZONE_ID=${TIMEZONE}
    volumes:
      - "./keys:/run/secrets:ro"
    depends_on:
      - postgres
    profiles:
      - app
volumes:
  bikesharing-db:
