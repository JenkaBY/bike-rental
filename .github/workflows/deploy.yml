name: CD Deploy to dev env

on:
  workflow_run:
    workflows: [ "CI Test" ]
    types: [ completed ]

concurrency:
  group: deploy-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: false

permissions:
  contents: write  # Need write access to push to dev-deploy branch

jobs:
  deploy:
    name: "Promote to dev-deploy branch"
    runs-on: ubuntu-latest
    env:
      POST_DEPLOY_HOOK_URL: ${{ secrets.POST_DEPLOY_HOOK_URL }}
    timeout-minutes: 10
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      (
        github.event.workflow_run.head_branch == 'main' ||
        github.event.workflow_run.head_branch == 'master' ||
        github.event.workflow_run.head_branch == 'develop'
      )

    steps:
      - name: Checkout sources
        id: checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Inject commit hash into Dockerfile
        run: |
          GIT_COMMIT=$(git rev-parse --short HEAD)
          sed -i "s/ARG GIT_COMMIT=.*/ARG GIT_COMMIT=$GIT_COMMIT/" service/Dockerfile
          echo "Injected GIT_COMMIT=$GIT_COMMIT into service/Dockerfile"

      - name: Push to dev-deploy branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add service/Dockerfile
          git diff --staged --quiet || git commit -m "build: inject commit ${{ github.event.workflow_run.head_sha }} into Dockerfile"
          git push origin HEAD:refs/heads/dev-deploy --force

      - name: Invoke post-deploy hook
        if: ${{ env.POST_DEPLOY_HOOK_URL != '' }}
        env:
          POST_DEPLOY_HOOK_URL: ${{ env.POST_DEPLOY_HOOK_URL }}
        run: |
          echo "Invoking post-deploy hook..."
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X GET "$POST_DEPLOY_HOOK_URL")
          echo "Post-deploy hook HTTP response: $HTTP_CODE"

