spring:
  jpa:
    properties:
      hibernate:
        show_sql: false
        highlight_sql: false
  datasource:
    url: jdbc:postgresql://localhost:5432/bikerental_component_test
    username: postgres
    password: postgres
  liquibase:
    #    disabled intentionally to speed up tests; assuming DB is already in correct state
    #    Once new DB change in the service module is introduced, the first run will require to one-time change this property to `true`
    enabled: true
    #    enabled for initial development stage
    drop-first: true
    contexts: test
  config:
    import: optional:nocommit.properties
logging:
  level:
    root: info
    com.github.jenkaby.bikerental: debug
    com.github.jenkaby.bikerental.componenttest: info

app:
  cors:
    allowed-origins: http://localhost:4200
  security:
    bootstrap:
      enabled: false
      admin-user:
        username: admin
        email: admin@bike-rental.local
        display-name: Administrator
        password: not-a-secret1
    jwt:
      issuer: http://localhost:8080
    spa-clients:
      - client-id: admin-spa
        redirect-uris: http://localhost:4200/login/callback
        post-logout-redirect-uris: http://localhost:4200
        scopes: openid,profile
      - client-id: operator-spa
        redirect-uris: http://localhost:4200/login/callback
        post-logout-redirect-uris: http://localhost:4200
        scopes: openid,profile
